<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vite App</title>
  </head>
  <body class="bg-black w-full h-screen text-white flex flex-col">
    <div class="w-full bg-gray-800 border-gray-800 border-b-2 px-3 py-2">
      <div class="container mx-auto">
      <div class="text-2xl">
        Pixel art creator
      </div>
      </div>
    </div>
    <div class="flex-grow flex">
      <div class="h-full bg-gray-900 space-y-1">
        <div id="pencil" class="bg-gray-700 hover:bg-gray-800 cursor-pointer w-10 h-10 flex justify-center items-center">
          ✏️
        </div>
        <div id="rect" class="bg-gray-700 hover:bg-gray-800 cursor-pointer w-10 h-10 flex justify-center items-center">
          🟦
        </div>
      </div>
      <div class="flex-grow h-full bg-gray-600 flex flex-col">
        <div>
          <input id="clr_picker" type="color" placeholder="Pick color">
        </div>
        <div class="flex-grow justify-center items-center">
          <canvas id="pixel_canvas"></canvas>
        </div>
      </div>
    </div>
    <script type="module" src="/main.js"></script>
</html>
